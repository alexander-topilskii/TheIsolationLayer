<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Isolation Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/mac.css" />
</head>
<body>
  <div id="desktop" class="desktop">
    <header class="menu-bar">
      <div class="menu-bar-metrics"></div>
    </header>
    <div class="workspace">
      <aside class="message-feed">
        <div class="mac-window">
          <div class="window-titlebar">
            <span class="window-title">Системные сообщения</span>
          </div>
          <div class="message-feed-body mac-inset"></div>
        </div>
      </aside>
      <main class="control-panel">
        <div class="mac-window">
          <div class="window-titlebar">
            <nav class="window-tabs">
              <button type="button" class="tab-btn active" data-tab="manual">Методичка</button>
              <button type="button" class="tab-btn" data-tab="sectors">Отсеки</button>
              <button type="button" class="tab-btn" data-tab="actions">Действия</button>
              <button type="button" class="tab-btn" data-tab="archive">Архив</button>
            </nav>
          </div>
          <div class="control-body mac-inset"></div>
          <footer class="control-footer">
            <p class="control-status"></p>
            <button type="button" class="mac-btn btn-ack" hidden>Подтвердить</button>
          </footer>
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
